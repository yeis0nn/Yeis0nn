<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jason Perez — Building Modern Digital Products</title>
  <desc id="desc">Dark SaaS-style profile banner with violet, blue, and cyan accents.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07080A"/>
      <stop offset="0.58" stop-color="#090B12"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="86" y1="0" x2="780" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B7CF6"/>
      <stop offset="0.55" stop-color="#6E9BFF"/>
      <stop offset="1" stop-color="#53D5E8"/>
    </linearGradient>
    <linearGradient id="mark" x1="1040" y1="70" x2="1190" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B7CF6"/>
      <stop offset="1" stop-color="#53D5E8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1115 155) rotate(143) scale(440 340)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6757E8" stop-opacity="0.24"/>
      <stop offset="0.55" stop-color="#2458C9" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#07080A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" stroke="#AEB8D0" stroke-opacity="0.045"/>
    </pattern>
    <filter id="blur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#background)"/>
  <rect width="1280" height="360" rx="24" fill="url(#glow)"/>
  <rect width="1280" height="360" rx="24" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="1279" height="359" rx="23.5" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <g opacity="0.9">
    <circle cx="1116" cy="180" r="92" fill="#6554E8" fill-opacity="0.16" filter="url(#blur)"/>
    <rect x="1058" y="105" width="118" height="150" rx="34" stroke="url(#mark)" stroke-width="2" transform="rotate(12 1058 105)"/>
    <rect x="1093" y="81" width="118" height="150" rx="34" stroke="url(#mark)" stroke-opacity="0.48" transform="rotate(12 1093 81)"/>
    <circle cx="1119" cy="178" r="8" fill="#53D5E8"/>
    <circle cx="1119" cy="178" r="18" stroke="#53D5E8" stroke-opacity="0.22"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="86" y="104" fill="#858B96" font-size="15" font-weight="600" letter-spacing="3.2">JASON PEREZ  /  @YEIS0NN</text>
    <text x="84" y="174" fill="#F7F8FA" font-size="52" font-weight="720" letter-spacing="-1.8">Building Modern</text>
    <text x="84" y="232" fill="url(#accent)" font-size="52" font-weight="720" letter-spacing="-1.8">Digital Products</text>
    <text x="86" y="291" fill="#C3C8D0" font-size="18" font-weight="500" letter-spacing="1.1">AI  •  CYBERSECURITY  •  WEB APPLICATIONS</text>
  </g>

  <rect x="86" y="319" width="174" height="2" rx="1" fill="url(#accent)"/>
</svg>
